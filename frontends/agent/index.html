<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AMT Office Queue | Agent Console</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="glass hero">
        <div class="hero-top-row">
          <h1 class="headline">Agent Ticket Console</h1>
          <div class="hero-actions">
            <button id="settings-toggle" class="notify-chip" type="button">Queue settings</button>
            <button id="notification-toggle" class="notify-chip" type="button" hidden></button>
          </div>
        </div>
        <p class="sub">Live queue for incoming front-desk QR tickets.</p>
        <span id="agent-badge" class="badge">Listening for new tickets...</span>
        <div id="agent-inline-alert" class="agent-inline-alert" hidden></div>

        <div id="queue-mode-hint" class="mode-hint">Demo mode (no queue identifier)</div>

        <div id="settings-panel" class="settings-panel" hidden>
          <label class="settings-label" for="passphrase-input">Queue identifier (optional)</label>
          <div class="settings-row">
            <input id="passphrase-input" class="passphrase-input" type="text" maxlength="64" placeholder="e.g. amber-river-lantern" />
            <button id="generate-passphrase" class="secondary" type="button">Generate</button>
          </div>
          <div class="settings-row">
            <button id="apply-passphrase" class="secondary" type="button">Apply</button>
            <button id="clear-passphrase" class="secondary" type="button">Use demo mode</button>
          </div>

          <label class="settings-label" for="role-input">Agent role (optional)</label>
          <div class="settings-row">
            <input id="role-input" class="passphrase-input" type="text" maxlength="64" placeholder="e.g. passport" />
            <button id="apply-role" class="secondary" type="button">+ Subscribe role</button>
            <button id="clear-role" class="secondary" type="button">Clear all roles</button>
          </div>
          <div class="role-groups">
            <div>
              <div class="qr-header">Subscribed roles</div>
              <div id="subscribed-roles" class="role-chip-wrap"></div>
            </div>
            <div>
              <div class="qr-header">Available roles</div>
              <div id="available-roles" class="role-chip-wrap"></div>
            </div>
          </div>

          <div class="qr-block">
            <div class="qr-header">User entry QR</div>
            <img id="user-qr" class="user-qr" alt="User entry QR code" width="220" height="220" />
            <a id="user-link" class="imprint-link" href="#" target="_blank" rel="noopener noreferrer"></a>
            <button id="download-qr" class="secondary" type="button">Download QR</button>
          </div>
        </div>
      </section>

      <section class="glass hero" style="margin-top: 20px">
        <h2 style="margin: 0 0 12px">Open Tickets</h2>
        <div id="tickets" class="grid"></div>
      </section>
    </main>

    <footer class="legal">
      <a id="imprint-link" class="imprint-link" href="#" target="_blank" rel="noopener noreferrer" hidden>Imprint</a>
      <p class="footnote">
        Built with little love and mostly AI.
        <a href="https://github.com/gidiLuke/simple-amt-ticket-system" target="_blank" rel="noopener noreferrer">github.com/gidiLuke/simple-amt-ticket-system</a>
      </p>
    </footer>

    <script src="../config.js"></script>
    <script src="./agent.js"></script>
  </body>
</html>
