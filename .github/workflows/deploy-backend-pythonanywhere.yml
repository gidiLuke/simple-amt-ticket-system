name: Deploy Backend to PythonAnywhere

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend-pythonanywhere.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend test dependencies
        run: |
          set -euo pipefail
          python -m pip install -r backend/requirements-dev.txt

      - name: Run backend tests
        run: |
          set -euo pipefail
          pytest -q backend/tests

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect dependency changes
        id: dependency_changes
        run: |
          set -euo pipefail

          requirements_changed=false

          if [[ "${{ github.event_name }}" == "push" ]]; then
            before_sha="${{ github.event.before }}"
            if [[ "$before_sha" != "0000000000000000000000000000000000000000" ]] && \
               git diff --quiet "$before_sha" "${{ github.sha }}" -- backend/requirements.txt; then
              requirements_changed=false
            elif [[ "$before_sha" != "0000000000000000000000000000000000000000" ]]; then
              requirements_changed=true
            fi
          elif git rev-parse HEAD^ >/dev/null 2>&1; then
            if ! git diff --quiet HEAD^ HEAD -- backend/requirements.txt; then
              requirements_changed=true
            fi
          fi

          echo "requirements_changed=${requirements_changed}" >> "$GITHUB_OUTPUT"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Validate PythonAnywhere configuration
        env:
          PA_API_TOKEN: ${{ secrets.PA_API_TOKEN }}
          PA_API_HOST: ${{ vars.PA_API_HOST || secrets.PA_API_HOST }}
          PA_USERNAME: ${{ vars.PA_USERNAME || secrets.PA_USERNAME }}
          PA_WEBAPP_DOMAIN: ${{ vars.PA_WEBAPP_DOMAIN || secrets.PA_WEBAPP_DOMAIN }}
        run: |
          set -euo pipefail

          missing=()
          [[ -n "${PA_API_TOKEN}" ]] || missing+=("PA_API_TOKEN (secret)")
          [[ -n "${PA_API_HOST}" ]] || missing+=("PA_API_HOST (variable or secret)")
          [[ -n "${PA_USERNAME}" ]] || missing+=("PA_USERNAME (variable or secret)")
          [[ -n "${PA_WEBAPP_DOMAIN}" ]] || missing+=("PA_WEBAPP_DOMAIN (variable or secret)")

          if (( ${#missing[@]} > 0 )); then
            printf -v joined '%s, ' "${missing[@]}"
            joined=${joined%, }
            echo "::error title=Missing PythonAnywhere workflow configuration::Set the following GitHub repository settings before rerunning: ${joined}."
            {
              echo "## Missing PythonAnywhere Configuration"
              echo
              echo "Set these GitHub repository settings before rerunning the deploy workflow:"
              echo
              echo "- Secret: PA_API_TOKEN"
              echo "- Variable or secret: PA_API_HOST"
              echo "- Variable or secret: PA_USERNAME"
              echo "- Variable or secret: PA_WEBAPP_DOMAIN"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Deploy via PythonAnywhere API
        env:
          PA_API_TOKEN: ${{ secrets.PA_API_TOKEN }}
          PA_API_HOST: ${{ vars.PA_API_HOST || secrets.PA_API_HOST }}
          PA_USERNAME: ${{ vars.PA_USERNAME || secrets.PA_USERNAME }}
          PA_WEBAPP_DOMAIN: ${{ vars.PA_WEBAPP_DOMAIN || secrets.PA_WEBAPP_DOMAIN }}
        run: |
          set -euo pipefail
          python backend/deploy/pythonanywhere_api_deploy.py

      - name: Warn about manual dependency install
        if: steps.dependency_changes.outputs.requirements_changed == 'true'
        run: |
          echo "::warning title=Manual PythonAnywhere action required::backend/requirements.txt changed. Open a PythonAnywhere Bash console and run 'workon amt-tickets && pip install -r ~/simple-amt-ticket-system/backend/requirements.txt', then reload the web app if needed."
          {
            echo "## Manual Action Required"
            echo
            echo "The deploy uploaded the updated backend code, but PythonAnywhere dependencies are not installed automatically."
            echo
            echo "Run this in a PythonAnywhere Bash console:"
            echo
            echo '```bash'
            echo 'workon amt-tickets'
            echo 'pip install -r ~/simple-amt-ticket-system/backend/requirements.txt'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

