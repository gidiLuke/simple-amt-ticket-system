name: Deploy Frontends to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "frontends/**"
      - ".github/workflows/deploy-frontends.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure frontend API URL
        env:
          FRONTEND_API_BASE_URL: ${{ vars.FRONTEND_API_BASE_URL || secrets.FRONTEND_API_BASE_URL }}
          PA_WEBAPP_DOMAIN: ${{ vars.PA_WEBAPP_DOMAIN || secrets.PA_WEBAPP_DOMAIN }}
        run: |
          set -euo pipefail

          api_url="${FRONTEND_API_BASE_URL:-}"
          if [[ -z "$api_url" && -n "${PA_WEBAPP_DOMAIN:-}" ]]; then
            api_url="https://${PA_WEBAPP_DOMAIN}"
          fi

          if [[ -z "$api_url" ]]; then
            echo "::error title=Missing frontend API configuration::Set FRONTEND_API_BASE_URL (variable/secret) or PA_WEBAPP_DOMAIN (variable/secret)."
            exit 1
          fi

          cat > frontends/config.js <<EOF
          window.APP_CONFIG = window.APP_CONFIG || {
            API_BASE_URL: "${api_url}"
          };
          EOF

          echo "Configured frontends/config.js with API_BASE_URL=${api_url}"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontends

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

